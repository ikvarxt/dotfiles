unbind r
bind r source-file ~/.tmux.conf \; display-message " ✱ tmux.conf is reloaded"

set -g default-terminal "tmux-256color"
set -ag terminal-overrides ",xterm-256color:RGB"
set -ga terminal-overrides ',*256color*:smcup@:rmcup@'

set -g mouse on
set -sg escape-time 0

set-window-option -g mode-keys vi

# Vim-style pane navigation with smart wrapping
bind -r h select-pane -L
bind -r j select-pane -D
bind -r k select-pane -U
bind -r l select-pane -R

# Resize panes with vim keys (repeatable)
bind -r H resize-pane -L 5
bind -r J resize-pane -D 2
bind -r K resize-pane -U 2
bind -r L resize-pane -R 5

# Don't exit copy mode when dragging with mouse
# unbind -T copy-mode-vi MouseDragEnd1Pane

# Create new panes in current directory
# bind c new-window -c "#{pane_current_path}"
bind '"' split-window -c "#{pane_current_path}"
bind % split-window -h -c "#{pane_current_path}"

set-option -g status-position bottom
set -g status-left-length 100
set -g status-right-length 50

set -g status-left '#{?client_prefix,#[fg=red] @ ,  }'
set -g status-right '#{pane_current_command} #P | #S '

# List of plugins
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'wfxr/tmux-fzf-url'

set -g @catppuccin_flavor 'latte' # latte, frappe, macchiato or mocha
set -g @catppuccin_window_status_style "basic" # basic, rounded, slanted, custom, or none
set -g @catppuccin_window_text " #{window_name} "
set -g @catppuccin_window_current_text " #{window_name} "
set -g @catppuccin_window_flags "icon" # none, icon, or text
# need Manual install: https://github.com/catppuccin/tmux
run ~/.config/tmux/plugins/catppuccin/tmux/catppuccin.tmux

run '~/.tmux/plugins/tpm/tpm'

